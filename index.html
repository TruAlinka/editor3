<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Редактор диктанта для Genially</title>
  <style>
    body { font-family: 'Montserrat', Arial, sans-serif; margin:0; background:#e9eafc;}
    .wr { max-width:1200px; margin:30px auto 80px auto; display:flex; gap:60px; }
    .editor-panel { flex:1 1 400px; background:#fff; border-radius:15px; box-shadow:0 2px 14px #0002; padding:24px;}
    .editor-panel h2 {border-bottom:2px solid #ddd9; padding-bottom:12px;}
    .tasks-edit { margin-bottom:24px;}
    .tasks-edit input, .tasks-edit select { font-size:15px; border-radius:5px; padding:3.5px 7px; margin:2px;}
    .tasks-edit img { width:40px; height:40px; object-fit:cover; border-radius:7px;}
    .tasks-row { display:flex; gap:6px; align-items:center; margin-bottom:4px; }
    .tasks-row input[type="text"] { width:94px;}
    .tasks-row .img-cell input[type="text"]{ width:160px; }
    .tasks-row .img-cell img {margin-right:2px;}
    .tasks-row .del { color:#a33; cursor:pointer; background:none; border:none;font-weight:700;font-size:16px;}
    .tasks-row .del:hover { text-decoration:underline;}
    .add-btn {background:#cdeaff;color:#147;border:none;border-radius:6px;padding:7px 11px;cursor:pointer;margin-top:3px;}
    .opts {margin:0 0 16px 0;}
    .opts label {margin-right:21px;font-size:15px;}
    .section-title { font-weight:700; margin-top:24px; margin-bottom:8px; font-size:18px;}
    textarea { width:100%; min-height:80px; font-size:13px; border-radius:7px; border:1.5px solid #89b;}
    .iframe-preview { width:420px; height:480px; border:none; box-shadow:0 2px 12px #0002; border-radius:11px; background:#f4f6fc;}
    .small { font-size:12px;color:#667;margin-top:-5px;}
    .copy-btn {margin-top:7px;margin-bottom:0;padding:6px 20px;border-radius:7px;border:none;background:#8af;color:#fff;font-weight:500;font-size:14px;cursor:pointer;}
    .main-preview { flex:1 1 420px;display:flex; flex-direction:column; align-items:center;}
  </style>
</head>
<body>
<div class="wr">
  <div class="editor-panel">
    <h2>Редактор диктанта (Genially)</h2>
    <div class="section-title">Задания</div>
    <div class="tasks-edit" id="tasks-edit"></div>
    <button class="add-btn" onclick="addTask()">+ Добавить задание</button>
    <div class="section-title">Настройки</div>
    <div class="opts">
      <label>Режим:
        <select id="game-mode" onchange="updateSettings()">
          <option value="order">Drag&amp;Drop буквы</option>
          <option value="input">Печатать слово</option>
        </select>
      </label>
      <label>Фон: 
        <input type="color" id="game-bg" value="#f4f6fc" onchange="updateSettings()"/>
        <input type="checkbox" id="bg-transparent" onchange="updateSettings()"/> прозрачный
      </label>
    </div>
    <div>
      <label>Фидбек-ru: <input type="text" id="feed-ru" value="Молодец!,Верно!,Здорово!" style="width:220px" onchange="updateSettings()"/></label>
    </div>
    <div>
      <label>Фидбек-en: <input type="text" id="feed-en" value="Well done!,Correct!,Great job!" style="width:217px" onchange="updateSettings()"/></label>
    </div>
    <div class="section-title">Готовый <b>iframe</b> для Genially:</div>
    <textarea id="iframe-code" readonly></textarea>
    <button class="copy-btn" onclick="copyIframe()">Скопировать iframe-код</button>
    <div class="small">Копируйте прямо в Genially (HTML-блок или на сайт)</div>
    <div class="section-title">Или полный HTML для скачивания:</div>
    <textarea id="html-code" readonly></textarea>
    <button class="copy-btn" onclick="copyHTML()">Скопировать HTML</button>
  </div>
  <div class="main-preview">
    <div class="section-title" style="margin-bottom:10px;">Предпросмотр:</div>
    <iframe class="iframe-preview" id="game-preview"></iframe>
  </div>
</div>
<script>
let settings = {
  mode: 'order',
  background: '#f4f6fc',
  transparent: false,
  feedback: {
    ru: ["Молодец!","Верно!","Здорово!"],
    en: ["Well done!","Correct!","Great job!"]
  }
};
let tasks = [
  { lang:'ru', img: "https://cdn.pixabay.com/photo/2017/01/20/15/06/apple-1995056_1280.png", definition: "Красный фрукт, падает с дерева", answer: "яблоко" },
  { lang:'en', img: "https://cdn.pixabay.com/photo/2017/01/20/15/06/apple-1995056_1280.png", definition: "A red fruit that falls from a tree", answer: "apple" }
];
function renderTaskTable() {
  let wrap = document.getElementById('tasks-edit');
  wrap.innerHTML = tasks.map((t,i)=>`
    <div class="tasks-row">
      <select onchange="editTaskLang(${i},this.value)">
        <option value="ru"${t.lang==='ru'?' selected':''}>RU</option>
        <option value="en"${t.lang==='en'?' selected':''}>EN</option>
      </select>
      <span class="img-cell">
        <input type="text" value="${t.img}" placeholder="Image URL" onchange="editTaskImg(${i},this.value)"/>
        <img src="${t.img}" loading="lazy" />
      </span>
      <input type="text" value="${t.definition}" placeholder="Дефиниция / Definition" onchange="editTaskDef(${i},this.value)"/>
      <input type="text" value="${t.answer}" placeholder="Слово/Word" onchange="editTaskAns(${i},this.value)" />
      <button class="del" title="Удалить" onclick="delTask(${i})">&times;</button>
    </div>
  `).join('');
}
function editTaskLang(i,val){ tasks[i].lang=val; updateAll(); }
function editTaskImg(i,val){ tasks[i].img=val; updateAll(); }
function editTaskDef(i,val){ tasks[i].definition=val; updateAll(); }
function editTaskAns(i,val){ tasks[i].answer=val; updateAll(); }
function delTask(i){ tasks.splice(i,1); updateAll(); }
function addTask(){
  tasks.push({lang:"ru", img:"", definition:"", answer:""});
  updateAll();
  setTimeout(() => {
    let inputs = document.querySelectorAll('.tasks-edit .tasks-row:last-child input[type="text"]');
    if (inputs && inputs[0]) inputs[0].focus();
  }, 100);
}
function updateSettings(){
  settings.mode = document.getElementById('game-mode').value;
  settings.background = document.getElementById('game-bg').value;
  settings.transparent = document.getElementById('bg-transparent').checked;
  settings.feedback.ru = document.getElementById('feed-ru').value.split(',').map(x=>x.trim()).filter(Boolean);
  settings.feedback.en = document.getElementById('feed-en').value.split(',').map(x=>x.trim()).filter(Boolean);
  updateAll();
}
function generateGameCode(){
  let grouped = { ru:[], en:[] };
  // — НЕ ДОБАВЛЯЕМ задания, где не заполнено слово или дефиниция —
  for(let t of tasks){
    if((t.lang==="ru"||t.lang==="en") && t.definition && t.answer){
      grouped[t.lang].push({...t});
    }
  }
  let background = settings.transparent ? "transparent" : settings.background;
  let mode = settings.mode;
  function htmlEscape(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  return `<!DOCTYPE html>
<html lang="ru">
<head>... [сохраняйте большую часть шаблона из рабочего редактора выше] ...</head>
<body>
<!-- остальной шаблон точно такой же, как раньше -->
</body></html>
  `.replace("... [сохраняйте большую часть шаблона из рабочего редактора выше] ...", /* вставьте тут кусок head+body+script "игры", который у вас уже рабочий и подробно описан выше */ "");
}
function updateAll(){
  renderTaskTable();
  let html = generateGameCode();
  let blobURL = URL.createObjectURL(new Blob([html],{type:'text/html'}));
  document.getElementById('game-preview').src = blobURL;
  let iframeCode = `<iframe src="${blobURL}" width="420" height="480" frameborder="0" style="background:${settings.transparent ? 'transparent':settings.background};border-radius:13px;box-shadow:0 1px 6px #0002;" allowfullscreen></iframe>`;
  document.getElementById('iframe-code').value = iframeCode;
  document.getElementById('html-code').value = html;
}
function copyIframe(){
  const el = document.getElementById('iframe-code');
  el.select(); el.setSelectionRange(0, 99999); document.execCommand('copy');
}
function copyHTML(){
  const el = document.getElementById('html-code');
  el.select(); el.setSelectionRange(0, 99999); document.execCommand('copy');
}
window.onload = () => { renderTaskTable(); updateAll(); };
</script>
</body>
</html>
